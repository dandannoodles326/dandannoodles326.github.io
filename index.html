<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Happy Birthday Ian</title>
  <style>
    :root {
      --ink: #2b2430;
      --muted: #695d6f;
      --paper: #fff9fb;
      --rose: #ff7aa8;
      --coral: #ff9b7b;
      --mint: #93dec2;
      --sky: #8fc7ff;
      --gold: #ffd166;
      --line: rgba(43, 36, 48, 0.12);
      --shadow: 0 22px 70px rgba(60, 38, 63, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 209, 102, 0.38), transparent 28rem),
        radial-gradient(circle at 85% 20%, rgba(143, 199, 255, 0.35), transparent 27rem),
        linear-gradient(135deg, #fff5f8 0%, #f5fbff 48%, #fff8e6 100%);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .sparkles span {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--rose);
      opacity: 0.55;
      animation: float 9s linear infinite;
    }

    .sparkles span:nth-child(2n) {
      width: 12px;
      height: 12px;
      background: var(--gold);
      animation-duration: 12s;
    }

    .sparkles span:nth-child(3n) {
      width: 8px;
      height: 8px;
      background: var(--mint);
      animation-duration: 10s;
    }

    .sparkles span:nth-child(1) { left: 7%; top: 86%; animation-delay: -1s; }
    .sparkles span:nth-child(2) { left: 18%; top: 74%; animation-delay: -4s; }
    .sparkles span:nth-child(3) { left: 30%; top: 92%; animation-delay: -2s; }
    .sparkles span:nth-child(4) { left: 44%; top: 82%; animation-delay: -7s; }
    .sparkles span:nth-child(5) { left: 58%; top: 90%; animation-delay: -5s; }
    .sparkles span:nth-child(6) { left: 70%; top: 78%; animation-delay: -3s; }
    .sparkles span:nth-child(7) { left: 82%; top: 88%; animation-delay: -8s; }
    .sparkles span:nth-child(8) { left: 92%; top: 80%; animation-delay: -6s; }

    @keyframes float {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      15% {
        opacity: 0.7;
      }
      100% {
        transform: translateY(-115vh) rotate(260deg);
        opacity: 0;
      }
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 28px 28px 112px;
    }

    main {
      display: grid;
      place-items: center;
      min-height: calc(100vh - 140px);
    }

    .page {
      display: none;
      width: min(960px, 100%);
      animation: pageIn 420ms ease both;
    }

    .page.active {
      display: block;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .panel {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(24px, 5vw, 54px);
      backdrop-filter: blur(18px);
    }

    .center {
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--rose);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1.04;
      letter-spacing: 0;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 6.5rem);
    }

    h2 {
      font-size: clamp(2rem, 5vw, 4.35rem);
    }

    p {
      max-width: 760px;
      margin: 22px auto 0;
      color: var(--muted);
      font-size: clamp(1.08rem, 2.2vw, 1.45rem);
      line-height: 1.62;
    }

    .love-line {
      color: var(--ink);
      font-weight: 800;
    }

    .gate {
      display: grid;
      gap: 16px;
      max-width: 460px;
      margin: 30px auto 0;
    }

    .gate input {
      width: 100%;
      border: 2px solid transparent;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 17px 18px;
      box-shadow: inset 0 0 0 1px var(--line);
      outline: none;
